<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn — HonuVibe.AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: #FDFBF7;
    color: #1A2B33;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: rgba(15,169,160,0.12); }
  table { border-collapse: collapse; width: 100%; }
</style>
</head>
<body>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── BRAND TOKENS ────────────────────────────────────────────────────────────
const T = {
  teal: '#0FA9A0',
  tealDark: '#0B7F78',
  coral: '#E8765A',
  coralSoft: '#FCEDE6',
  navy: '#1A2B33',
  slate: '#5A6B73',
  caption: '#8B9499',
  canvas: '#FDFBF7',
  sand: '#F5F0E8',
  white: '#FFFFFF',
};

// ─── SHARED ICONS ────────────────────────────────────────────────────────────
const IconHonu = () => (
  <svg width="30" height="30" viewBox="0 0 32 32" fill="none">
    <ellipse cx="16" cy="17" rx="10" ry="8" fill="currentColor" opacity="0.15"/>
    <ellipse cx="16" cy="16" rx="8" ry="6.5" fill="currentColor"/>
    <ellipse cx="16" cy="15" rx="5" ry="4" fill="currentColor" opacity="0.25"/>
    <ellipse cx="9" cy="20" rx="3.5" ry="2" fill="currentColor" transform="rotate(-20 9 20)"/>
    <ellipse cx="23" cy="20" rx="3.5" ry="2" fill="currentColor" transform="rotate(20 23 20)"/>
    <ellipse cx="8" cy="14" rx="3" ry="1.8" fill="currentColor" transform="rotate(-30 8 14)"/>
    <ellipse cx="24" cy="14" rx="3" ry="1.8" fill="currentColor" transform="rotate(30 24 14)"/>
    <ellipse cx="16" cy="10" rx="3" ry="2.5" fill="currentColor"/>
    <path d="M16 23.5 Q15.5 26 16 27 Q16.5 26 16 23.5" fill="currentColor"/>
    <circle cx="14.5" cy="10" r="0.8" fill="#FDFBF7"/>
    <circle cx="17.5" cy="10" r="0.8" fill="#FDFBF7"/>
  </svg>
);
const IconArrow = ({ size = 16 }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M3 8h10M9 4l4 4-4 4"/>
  </svg>
);
const IconCheck = ({ color = T.teal, size = 16 }) => (
  <svg width={size} height={size} viewBox="0 0 16 16" fill="none">
    <circle cx="8" cy="8" r="7.5" stroke={color} strokeWidth="1"/>
    <path d="M5 8l2.5 2.5L11 5" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);
const IconBook = () => (
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={T.teal} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <path d="M4 3h7a2 2 0 0 1 2 2v13a1 1 0 0 1-1 1H4V3z"/>
    <path d="M18 3h-5v16h5a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1z"/>
    <path d="M7 7h4M7 10h4M7 13h4"/>
  </svg>
);
const IconCohort = () => (
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={T.teal} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="8" cy="7" r="3"/>
    <circle cx="14" cy="7" r="3"/>
    <path d="M2 19c0-3.31 2.69-6 6-6h6c3.31 0 6 2.69 6 6"/>
  </svg>
);
const IconKey = () => (
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke={T.coral} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="8" cy="11" r="5"/>
    <path d="M13 11h8M18 9v4"/>
    <path d="M11.5 11h1.5"/>
  </svg>
);
const IconPlay = () => (
  <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
    <circle cx="10" cy="10" r="9.5" stroke={T.teal} strokeWidth="1"/>
    <path d="M8 7l6 3-6 3V7z" fill={T.teal}/>
  </svg>
);
const IconStar = () => (
  <svg width="14" height="14" viewBox="0 0 14 14" fill={T.coral} opacity="0.7">
    <path d="M7 1l1.55 3.14L12 4.64l-2.5 2.44.59 3.44L7 8.77l-3.09 1.75.59-3.44L2 4.64l3.45-.5L7 1z"/>
  </svg>
);

// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [langJP, setLangJP] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const links = [
    { label: 'Learn', active: true },
    { label: 'Explore' }, { label: 'Partnerships' }, { label: 'About' }, { label: 'Contact' },
  ];
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: T.canvas,
      borderBottom: scrolled ? '1px solid rgba(26,43,51,0.1)' : '1px solid transparent',
      boxShadow: scrolled ? '0 2px 20px rgba(26,43,51,0.06)' : 'none',
      transition: 'border-color 0.3s, box-shadow 0.3s',
    }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto', padding: '0 32px',
        height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <a href="Homepage.html" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none', color: T.teal }}>
          <IconHonu />
          <span style={{ fontWeight: 700, fontSize: 18, letterSpacing: '-0.01em', color: T.navy }}>
            HonuVibe<span style={{ color: T.teal }}>.AI</span>
          </span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          {links.map(link => (
            <a key={link.label} href="#" style={{
              color: link.active ? T.teal : T.slate,
              fontSize: 14.5, fontWeight: link.active ? 600 : 500,
              textDecoration: 'none',
              borderBottom: link.active ? `2px solid ${T.teal}` : '2px solid transparent',
              paddingBottom: 2, transition: 'color 0.2s',
            }}>{link.label}</a>
          ))}
        </div>
        <button onClick={() => setLangJP(!langJP)} style={{
          background: 'none', border: '1px solid rgba(26,43,51,0.15)',
          borderRadius: 6, padding: '5px 12px', fontSize: 12.5, fontWeight: 600,
          cursor: 'pointer', color: T.slate, letterSpacing: '0.04em',
        }}>{langJP ? 'EN' : '日本語'}</button>
      </div>
    </nav>
  );
}

// ─── HERO ─────────────────────────────────────────────────────────────────────
function Hero() {
  return (
    <section style={{ background: T.canvas, paddingTop: 68 }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '88px 32px 72px' }}>
        <div style={{ maxWidth: 640 }}>
          <p style={{
            fontSize: 11.5, fontWeight: 700, letterSpacing: '0.09em',
            textTransform: 'uppercase', color: T.slate, marginBottom: 18,
          }}>Ways to Learn</p>
          <h1 style={{
            fontSize: 'clamp(40px, 5vw, 62px)', fontWeight: 700,
            letterSpacing: '-0.025em', color: T.navy, lineHeight: 1.1,
            marginBottom: 20,
          }}>
            Three paths.<br />
            <span style={{ color: T.teal }}>One destination.</span>
          </h1>
          <p style={{ fontSize: 18, lineHeight: 1.7, color: T.slate, maxWidth: 520 }}>
            Whether you're learning solo, joining a live cohort, or building a program for your community — HonuVibe meets you where you are.
          </p>
        </div>
      </div>
    </section>
  );
}

// ─── THREE PATHS ─────────────────────────────────────────────────────────────
function ThreePaths() {
  return (
    <section style={{ background: T.canvas, padding: '0 32px 100px' }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto',
        display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24,
        alignItems: 'start',
      }}>
        <CoursesCard />
        <VaultCard />
        <PrivateCard />
      </div>
    </section>
  );
}

function BulletItem({ text, iconColor = T.teal }) {
  return (
    <li style={{
      display: 'flex', alignItems: 'flex-start', gap: 10,
      fontSize: 14.5, color: T.slate, lineHeight: 1.5,
      listStyle: 'none', marginBottom: 10,
    }}>
      <span style={{ marginTop: 1, flexShrink: 0 }}><IconCheck color={iconColor} /></span>
      <span>{text}</span>
    </li>
  );
}

function VaultCard() {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: T.white, borderRadius: 16,
        border: hover ? `1.5px solid ${T.teal}` : `1.5px solid ${T.teal}`,
        boxShadow: hover
          ? '0 24px 64px rgba(15,169,160,0.15)'
          : '0 10px 40px rgba(15,169,160,0.12)',
        padding: '36px 32px 32px',
        transition: 'all 0.3s',
        transform: hover ? 'translateY(-6px)' : 'translateY(-4px)',
        position: 'relative',
      }}
    >
      <div style={{
        position: 'absolute', top: -13, left: '50%', transform: 'translateX(-50%)',
        background: T.teal, color: '#fff',
        borderRadius: 20, padding: '4px 16px',
        fontSize: 11, fontWeight: 700, letterSpacing: '0.05em',
        whiteSpace: 'nowrap',
      }}>MOST POPULAR</div>
      <div style={{ marginBottom: 18 }}><IconBook /></div>
      <span style={{
        display: 'inline-block', marginBottom: 16,
        background: T.coralSoft, color: T.teal,
        borderRadius: 20, padding: '4px 12px',
        fontSize: 11, fontWeight: 700, letterSpacing: '0.06em',
      }}>MEMBERSHIP</span>
      <h2 style={{ fontSize: 26, fontWeight: 700, color: T.navy, marginBottom: 12, letterSpacing: '-0.015em' }}>
        The Vault
      </h2>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: T.slate, marginBottom: 24 }}>
        An always-on AI learning library — lessons, frameworks, prompts, and real-world workflows you can revisit anytime.
      </p>
      <ul style={{ padding: 0, marginBottom: 28 }}>
        <BulletItem text="100+ lessons across 6 libraries" />
        <BulletItem text="Bilingual EN / 日本語" />
        <BulletItem text="New content monthly" />
      </ul>
      <div style={{ marginBottom: 20 }}>
        <p style={{ fontSize: 13, color: T.caption, textDecoration: 'line-through', marginBottom: 2 }}>$99/month</p>
        <p style={{ fontSize: 22, fontWeight: 700, color: T.navy, lineHeight: 1 }}>$49<span style={{ fontSize: 14, fontWeight: 500, color: T.slate }}>/month</span></p>
        <p style={{ fontSize: 12, color: T.teal, fontWeight: 600, marginTop: 4 }}>Founding member rate</p>
      </div>
      <PathCTA label="Join the Vault →" filled />
    </div>
  );
}

function CoursesCard() {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: T.white, borderRadius: 16,
        border: hover ? `1px solid ${T.teal}` : '1px solid rgba(26,43,51,0.08)',
        boxShadow: hover ? '0 16px 48px rgba(15,169,160,0.1)' : '0 4px 16px rgba(26,43,51,0.06)',
        padding: '36px 32px 32px',
        transition: 'all 0.3s',
        transform: hover ? 'translateY(-4px)' : 'none',
      }}
    >
      <div style={{ marginBottom: 18 }}><IconCohort /></div>
      <span style={{
        display: 'inline-block', marginBottom: 16,
        background: T.coralSoft, color: T.teal,
        borderRadius: 20, padding: '4px 12px',
        fontSize: 11, fontWeight: 700, letterSpacing: '0.06em',
      }}>COHORT-BASED</span>
      <h2 style={{ fontSize: 26, fontWeight: 700, color: T.navy, marginBottom: 12, letterSpacing: '-0.015em' }}>
        Public Courses
      </h2>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: T.slate, marginBottom: 24 }}>
        Live cohort-based courses with real instructors, real classmates, and real accountability. Per-course enrollment.
      </p>
      <ul style={{ padding: 0, marginBottom: 28 }}>
        <BulletItem text="Live Zoom sessions, recorded" />
        <BulletItem text="Hands-on projects + feedback" />
        <BulletItem text="Bilingual EN / 日本語" />
      </ul>
      <p style={{ fontSize: 13, color: T.caption, marginBottom: 20, fontWeight: 500 }}>
        From <strong style={{ color: T.navy, fontSize: 15 }}>$1,250 per course</strong>
      </p>
      <PathCTA label="Browse Courses →" filled />
    </div>
  );
}

function PrivateCard() {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: T.sand, borderRadius: 16,
        border: hover ? `1.5px solid ${T.coral}` : `1px solid ${T.coral}`,
        boxShadow: hover ? '0 16px 48px rgba(232,118,90,0.12)' : '0 4px 16px rgba(26,43,51,0.06)',
        padding: '36px 32px 32px',
        transition: 'all 0.3s',
        transform: hover ? 'translateY(-4px)' : 'none',
        position: 'relative',
        overflow: 'hidden',
      }}
    >
      {/* Top accent strip */}
      <div style={{
        position: 'absolute', top: 0, left: 0, right: 0, height: 3,
        background: `linear-gradient(90deg, ${T.coral}, #c45a40)`,
      }}/>
      <div style={{ marginBottom: 18 }}><IconKey /></div>
      <span style={{
        display: 'inline-block', marginBottom: 16,
        background: T.navy, color: '#fff',
        borderRadius: 20, padding: '4px 12px',
        fontSize: 11, fontWeight: 700, letterSpacing: '0.06em',
      }}>BY APPLICATION</span>
      <h2 style={{ fontSize: 26, fontWeight: 700, color: T.navy, marginBottom: 12, letterSpacing: '-0.015em' }}>
        Private Cohorts
      </h2>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: T.slate, marginBottom: 24 }}>
        Bilingual AI training programs built exclusively for partner communities and organizations.
      </p>
      <ul style={{ padding: 0, marginBottom: 28 }}>
        <BulletItem text="Custom curriculum to your audience" iconColor={T.coral} />
        <BulletItem text="Bilingual EN / 日本語 delivery" iconColor={T.coral} />
        <BulletItem text="Branded co-delivery with your community" iconColor={T.coral} />
      </ul>
      {/* Partner marks */}
      <div style={{
        borderTop: '1px solid rgba(26,43,51,0.1)', paddingTop: 16, marginBottom: 24,
        display: 'flex', flexDirection: 'column', gap: 8,
      }}>
        {['Vertice Society × HonuVibe', 'SmashHaus × HonuVibe'].map((p, i) => (
          <div key={i} style={{
            display: 'flex', alignItems: 'center', gap: 8,
          }}>
            <div style={{
              width: 6, height: 6, borderRadius: '50%', background: T.coral,
            }}/>
            <span style={{ fontSize: 12.5, fontWeight: 600, color: T.slate }}>{p}</span>
          </div>
        ))}
      </div>
      <PathCTA label="Apply for Partnership →" filled={false} coral />
    </div>
  );
}

function PathCTA({ label, filled, coral }) {
  const [hover, setHover] = useState(false);
  const bg = filled
    ? (hover ? T.tealDark : T.teal)
    : coral
    ? 'transparent'
    : 'transparent';
  const border = filled ? 'none' : coral ? `1.5px solid ${T.coral}` : `1.5px solid ${T.teal}`;
  const color = filled ? '#fff' : coral ? T.coral : T.teal;
  return (
    <button
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: bg, border, color,
        width: '100%', padding: '12px 20px', borderRadius: 10,
        fontSize: 14.5, fontWeight: 700, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
        transition: 'all 0.2s',
        boxShadow: filled && hover ? '0 6px 20px rgba(15,169,160,0.25)' : 'none',
      }}
    >{label}</button>
  );
}

// ─── COURSES CATALOG ─────────────────────────────────────────────────────────
function CoursesCatalog() {
  const [activeFilter, setActiveFilter] = useState('All Levels');
  const filters = ['All Levels', 'Beginner', 'Intermediate', 'Advanced', 'Builder Track'];

  const courses = [
    {
      tags: ['BEGINNER', '5 WEEKS', 'EN / 日本語'],
      title: 'AI Essentials',
      desc: 'Foundational AI literacy for professionals. Understand how AI works, where it applies to your work, and how to start using it today.',
      cohort: 'Starts June 9, 2026',
      price: '$1,250',
      cta: 'Enroll Now',
      level: 'Beginner',
    },
    {
      tags: ['INTERMEDIATE', '5 WEEKS', 'EN / 日本語'],
      title: 'AI Mastery',
      desc: 'Hands-on application and custom AI workflows. Build real systems, automate real tasks, integrate AI into your day-to-day work.',
      cohort: 'Starts July 14, 2026',
      price: '$1,750',
      cta: 'Enroll Now',
      level: 'Intermediate',
    },
    {
      tags: ['ADVANCED', 'MULTIPLE COURSES', 'EN'],
      title: 'Builder Track',
      desc: 'For learners who want to go deeper. Claude Code, Micro-SaaS development, Workflow Automation, and shipping real AI products.',
      cohort: '3 courses inside',
      price: 'Bundle pricing available',
      cta: 'Explore Track',
      level: 'Advanced',
      track: true,
    },
  ];

  const filtered = activeFilter === 'All Levels' || activeFilter === 'Builder Track'
    ? (activeFilter === 'Builder Track' ? courses.filter(c => c.track) : courses)
    : courses.filter(c => c.level === activeFilter);

  return (
    <section style={{ background: T.sand, padding: '96px 32px' }}>
      <div style={{ maxWidth: 1200, margin: '0 auto' }}>
        {/* Header */}
        <div style={{ marginBottom: 48 }}>
          <p style={{
            fontSize: 11.5, fontWeight: 700, letterSpacing: '0.09em',
            textTransform: 'uppercase', color: T.teal, marginBottom: 12,
          }}>Public Courses</p>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end' }}>
            <div>
              <h2 style={{
                fontSize: 'clamp(28px, 3.5vw, 42px)', fontWeight: 700,
                letterSpacing: '-0.02em', color: T.navy, marginBottom: 8,
              }}>Browse the catalog.</h2>
              <p style={{ fontSize: 16, color: T.slate }}>Per-course enrollment. Live cohorts. Bilingual delivery.</p>
            </div>
          </div>
        </div>

        {/* Filters */}
        <div style={{ display: 'flex', gap: 10, marginBottom: 40, flexWrap: 'wrap' }}>
          {filters.map(f => (
            <button
              key={f}
              onClick={() => setActiveFilter(f)}
              style={{
                padding: '8px 18px', borderRadius: 20,
                border: activeFilter === f ? 'none' : '1px solid rgba(26,43,51,0.15)',
                background: activeFilter === f ? T.teal : 'transparent',
                color: activeFilter === f ? '#fff' : T.slate,
                fontSize: 13.5, fontWeight: 600, cursor: 'pointer',
                transition: 'all 0.2s',
              }}
            >{f}</button>
          ))}
        </div>

        {/* Grid */}
        <div style={{
          display: 'grid',
          gridTemplateColumns: `repeat(${filtered.length}, 1fr)`,
          gap: 24, marginBottom: 32,
        }}>
          {filtered.map((course, i) => (
            <CourseCard key={i} course={course} />
          ))}
        </div>

        <div style={{ textAlign: 'right' }}>
          <a href="#" style={{
            fontSize: 14.5, fontWeight: 600, color: T.teal,
            textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 6,
          }}>See all courses <IconArrow /></a>
        </div>
      </div>
    </section>
  );
}

function CourseCard({ course }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: T.white, borderRadius: 14,
        border: hover ? `1px solid ${T.teal}` : '1px solid rgba(26,43,51,0.07)',
        boxShadow: hover ? '0 12px 40px rgba(15,169,160,0.1)' : '0 2px 8px rgba(26,43,51,0.05)',
        padding: '28px 26px',
        transition: 'all 0.25s',
        transform: hover ? 'translateY(-3px)' : 'none',
        position: 'relative', overflow: 'hidden',
        display: 'flex', flexDirection: 'column',
      }}
    >
      {course.track && (
        <div style={{
          position: 'absolute', top: 0, right: 0,
          background: T.coral, color: '#fff',
          fontSize: 10.5, fontWeight: 700, letterSpacing: '0.06em',
          padding: '5px 14px', borderBottomLeftRadius: 10,
        }}>TRACK</div>
      )}
      <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 20 }}>
        {course.tags.map((tag, i) => (
          <span key={i} style={{
            background: T.coralSoft, color: T.coral,
            borderRadius: 20, padding: '4px 11px',
            fontSize: 11, fontWeight: 700, letterSpacing: '0.04em',
          }}>{tag}</span>
        ))}
      </div>
      <h3 style={{ fontSize: 22, fontWeight: 700, color: T.navy, marginBottom: 10, letterSpacing: '-0.01em' }}>
        {course.title}
      </h3>
      <p style={{ fontSize: 14.5, lineHeight: 1.65, color: T.slate, flex: 1, marginBottom: 20 }}>
        {course.desc}
      </p>
      <div style={{
        borderTop: '1px solid rgba(26,43,51,0.07)', paddingTop: 18,
        display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18,
