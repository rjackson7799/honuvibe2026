// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav() {
  const [scrolled, setScrolled] = useState(false);
  const [langJP, setLangJP] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  const links = [
    { label: 'Learn', href: 'Learn.html' },
    { label: 'Explore', href: 'Explore.html' },
    { label: 'Partnerships', active: true },
    { label: 'About' },
    { label: 'Contact' },
  ];
  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: T.canvas,
      borderBottom: scrolled ? '1px solid rgba(26,43,51,0.1)' : '1px solid transparent',
      boxShadow: scrolled ? '0 2px 20px rgba(26,43,51,0.06)' : 'none',
      transition: 'border-color 0.3s, box-shadow 0.3s',
    }}>
      <div style={{
        maxWidth: 1200, margin: '0 auto', padding: '0 32px',
        height: 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between',

            HonuVibe<span style={{ color: T.teal }}>.AI</span>
          </span>
        </a>
        <div style={{ display: 'flex', alignItems: 'center', gap: 32 }}>
          {links.map(link => (
            <a key={link.label} href={link.href || '#'} style={{
              color: link.active ? T.coral : T.slate,
              fontSize: 14.5, fontWeight: link.active ? 600 : 500,
              textDecoration: 'none',
              borderBottom: link.active ? `2px solid ${T.coral}` : '2px solid transparent',
              paddingBottom: 2, transition: 'color 0.2s',
            }}>{link.label}</a>
          ))}
        </div>

          background: 'none', border: '1px solid rgba(26,43,51,0.15)',

          cursor: 'pointer', color: T.slate, letterSpacing: '0.04em',

function PricingCard({ tier }) {
  const [hover, setHover] = useState(false);

    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: tier.highlight ? T.navy : T.white,
        border: tier.highlight ? 'none' : `1px solid ${hover ? 'rgba(15,169,160,0.2)' : 'rgba(26,43,51,0.09)'}`,
        borderRadius: 16, padding: '36px 32px',
        boxShadow: tier.highlight
          ? '0 16px 48px rgba(26,43,51,0.2)'
          : hover ? '0 8px 28px rgba(26,43,51,0.07)' : '0 2px 8px rgba(26,43,51,0.04)',
        transition: 'all 0.25s',
        position: 'relative',
        transform: tier.highlight ? 'scale(1.025)' : 'none',
      }}
    >
      {tier.highlight && (

      <p style={{ fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase',

        {tier.name}

      <p style={{ fontSize: 14, lineHeight: 1.6, color: tier.highlight ? 'rgba(255,255,255,0.65)' : T.slate, marginBottom: 24 }}>
        {tier.desc}
      </p>
      <div style={{ marginBottom: 28 }}>
        <span style={{ fontSize: 11, color: tier.highlight ? 'rgba(255,255,255,0.45)' : T.caption }}>
          {tier.priceNote}&nbsp;
        </span>
        <span style={{
          fontSize: 38, fontWeight: 700, letterSpacing: '-0.03em',
          color: tier.highlight ? '#fff' : T.navy,
        }}>{tier.price}</span>
      </div>
      <div style={{
        borderTop: `1px solid ${tier.highlight ? 'rgba(255,255,255,0.1)' : 'rgba(26,43,51,0.07)'}`,
        paddingTop: 22, marginBottom: 28,
        display: 'flex', flexDirection: 'column', gap: 10,
      }}>
        {tier.includes.map((item, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
