// ─── NAV ─────────────────────────────────────────────────────────────────────
function Nav({ tweaks }) {
  const [scrolled, setScrolled] = useState(false);
  const [langJP, setLangJP] = useState(tweaks.showJP);
  const [mobileOpen, setMobileOpen] = useState(false);

  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);

  const links = ['Learn', 'Explore', 'Partnerships', 'About', 'Contact'];

  return (
    <nav style={{
      position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
      background: tweaks.bgPrimary,

            fontSize: 14.5, fontWeight: 600, color: tweaks.accentTeal,
            textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 6,
          }}>Explore our work <IconArrow /></a>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24 }}>
          {projects.map((proj, i) => (
            <ProjectCard key={i} proj={proj} tweaks={tweaks} />
          ))}
        </div>
      </div>
    </section>
  );
}

function ProjectCard({ proj, tweaks }) {
  const [hover, setHover] = useState(false);
  return (
    <div
      onMouseEnter={() => setHover(true)}
      onMouseLeave={() => setHover(false)}
      style={{
        background: '#fff',
        borderRadius: tweaks.cardRadius + 4,
        overflow: 'hidden',
        border: '1.5px solid rgba(26,43,51,0.07)',
        boxShadow: hover ? '0 12px 32px rgba(26,43,51,0.1)' : '0 2px 8px rgba(26,43,51,0.05)',
        transition: 'all 0.25s',
        transform: hover ? 'translateY(-3px)' : 'none',
        cursor: 'pointer',
      }}
    >
      <div style={{
        height: 160, background: proj.color,
        position: 'relative',
      }}>
        <div style={{
          position: 'absolute', inset: 0, opacity: 0.4,
          background: 'linear-gradient(160deg, transparent 60%, rgba(26,43,51,0.15))',
        }}/>
      </div>
      <div style={{ padding: 22 }}>
        <h4 style={{ fontSize: 16, fontWeight: 700, color: tweaks.textNavy, marginBottom: 6 }}>{proj.title}</h4>
        <p style={{ fontSize: 13.5, color: '#5A6B73', marginBottom: 14, lineHeight: 1.5 }}>{proj.desc}</p>
        <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
          {proj.tags.map((tag, i) => (
            <span key={i} style={{
              background: tweaks.bgSand, color: '#5A6B73',
              borderRadius: 20, padding: '3px 10px',
              fontSize: 11.5, fontWeight: 500,
            }}>{tag}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── NEWSLETTER ───────────────────────────────────────────────────────────────
function Newsletter({ tweaks }) {

  const [submitted, setSubmitted] = useState(false);

  return (
    <section style={{
      background: `linear-gradient(135deg, rgba(15,169,160,0.06) 0%, ${tweaks.bgSand} 50%, rgba(232,118,90,0.06) 100%)`,
      padding: '96px 32px',
      borderTop: `1px solid rgba(15,169,160,0.12)`,
    }}>
      <div style={{ maxWidth: 560, margin: '0 auto', textAlign: 'center' }}>
        <h2 style={{
          fontSize: 'clamp(28px, 4vw, 44px)', fontWeight: 700,
          letterSpacing: '-0.02em', color: tweaks.textNavy,
          marginBottom: 12,
        }}>Join the wave.</h2>
        <p style={{ fontSize: 17, lineHeight: 1.65, color: '#5A6B73', marginBottom: 36 }}>
          Get weekly insights, tutorials, and community highlights from the HonuVibe community.
        </p>
        {!submitted ? (
          <>
            <form
              onSubmit={e => { e.preventDefault(); if (email) setSubmitted(true); }}

              <input
                type="email"
                value={email}
                onChange={e => setEmail(e.target.value)}

                style={{
                  flex: 1, padding: '14px 18px', borderRadius: 10,
                  border: '1.5px solid rgba(26,43,51,0.15)',
                  fontSize: 15, outline: 'none', background: '#fff',
                  color: tweaks.textNavy, fontFamily: 'inherit',
                }}
              />
              <button type="submit" style={{
                background: tweaks.accentTeal, color: '#fff', border: 'none',
                padding: '14px 24px', borderRadius: 10, fontSize: 15, fontWeight: 700,
                cursor: 'pointer', whiteSpace: 'nowrap',
              }}>Subscribe</button>
            </form>
            <a href="#" style={{
              fontSize: 14, color: '#5A6B73', textDecoration: 'none',

        ) : (
          <div style={{
            background: 'rgba(15,169,160,0.08)', borderRadius: 14,

              🐢 You're in!

            <p style={{ fontSize: 15, color: '#5A6B73' }}>
              Welcome to the HonuVibe community. Check your inbox.

  );
}

// ─── TWEAKS PANEL ─────────────────────────────────────────────────────────────
function AppTweaks({ tweaks, setTweak }) {
  return (
    <TweaksPanel>
      <TweakSection title="Colors">
        <TweakColor label="Teal Accent" tweakKey="accentTeal" value={tweaks.accentTeal} onChange={v => setTweak('accentTeal', v)} />
        <TweakColor label="Coral Accent" tweakKey="accentCoral" value={tweaks.accentCoral} onChange={v => setTweak('accentCoral', v)} />
        <TweakColor label="Canvas BG" tweakKey="bgPrimary" value={tweaks.bgPrimary} onChange={v => setTweak('bgPrimary', v)} />
        <TweakColor label="Sand BG" tweakKey="bgSand" value={tweaks.bgSand} onChange={v => setTweak('bgSand', v)} />
      </TweakSection>
      <TweakSection title="Layout">
        <TweakRadio
          label="Hero Layout"
          tweakKey="heroLayout"
          value={tweaks.heroLayout}
          options={[{ value: 'split', label: 'Split' }, { value: 'centered', label: 'Centered' }]}
          onChange={v => setTweak('heroLayout', v)}
        />
        <TweakSlider label="Card Radius" tweakKey="cardRadius" value={tweaks.cardRadius} min={4} max={24} step={2} onChange={v => setTweak('cardRadius', v)} />
      </TweakSection>
      <TweakSection title="Content">
        <TweakToggle label="Show JP default" tweakKey="showJP" value={tweaks.showJP} onChange={v => setTweak('showJP', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <div style={{ fontFamily: "'Inter', sans-serif" }}>
      <Nav tweaks={tweaks} />
      <Hero tweaks={tweaks} />
      <HowItWorks tweaks={tweaks} />
      <ValueProps tweaks={tweaks} />
      <VaultSection tweaks={tweaks} />
      <Courses tweaks={tweaks} />
      <OrgSection tweaks={tweaks} />
      <ExplorationSection tweaks={tweaks} />
      <Testimonials tweaks={tweaks} />
      <Newsletter tweaks={tweaks} />
      <Footer tweaks={tweaks} />
      <AppTweaks tweaks={tweaks} setTweak={setTweak} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
