// ─── SIDEBAR ─────────────────────────────────────────────────────────────────
function Sidebar({ active, setActive }) {
  const mainLinks = [
    { id: 'dashboard', label: 'Dashboard', icon: icons.dashboard },
    { id: 'courses',   label: 'My Courses', icon: icons.courses },
    { id: 'vault',     label: 'The Vault',  icon: icons.vault },
    { id: 'community', label: 'Community',  icon: icons.community },
    { id: 'billing',   label: 'Billing',    icon: icons.billing },
    { id: 'profile',   label: 'Profile',    icon: icons.profile },
  ];
  const bottomLinks = [
    { id: 'admin',   label: 'Admin',    icon: icons.admin },
    { id: 'signout', label: 'Sign Out', icon: icons.signout },
  ];
  return (
    <div style={{ width: 220, flexShrink: 0, height: '100%', background: T.canvas, borderRight: '1px solid rgba(26,43,51,0.08)', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '20px 20px 16px', borderBottom: '1px solid rgba(26,43,51,0.07)', display: 'flex', alignItems: 'center', gap: 9 }}>
        <div style={{ color: T.teal }}><IconHonu size={26} /></div>
        <span style={{ fontWeight: 700, fontSize: 16, letterSpacing: '-0.01em', color: T.navy }}>
          HonuVibe<span style={{ color: T.teal }}>.AI</span>
        </span>
      </div>
      <div style={{ padding: '12px 16px', borderBottom: '1px solid rgba(26,43,51,0.07)', display: 'flex', gap: 4 }}>
        {['EN','日本語'].map((l,i) => (
          <button key={i} style={{ padding:'4px 10px', borderRadius:6, border:'none', cursor:'pointer', background: i===0 ? T.teal : 'transparent', color: i===0 ? '#fff' : T.caption, fontSize:12, fontWeight:600, fontFamily:'inherit' }}>{l}</button>
        ))}
      </div>
      <nav style={{ flex: 1, padding: '12px 10px', display: 'flex', flexDirection: 'column', gap: 2 }}>
        {mainLinks.map(link => <NavItem key={link.id} link={link} active={active===link.id} onClick={() => setActive(link.id)} />)}

      <div style={{ padding: '10px 10px 16px', borderTop: '1px solid rgba(26,43,51,0.07)', display: 'flex', flexDirection: 'column', gap: 2 }}>

function NavItem({ link, active, onClick, muted }) {
  const [hover, setHover] = useState(false);
  return (
    <button onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)} onClick={onClick}
      style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 12px', borderRadius:9, border:'none', cursor:'pointer', background: active ? T.teal : hover ? 'rgba(26,43,51,0.05)' : 'transparent', color: active ? '#fff' : muted ? T.caption : hover ? T.navy : T.slate, fontSize:13.5, fontWeight: active ? 600 : 500, fontFamily:'inherit', textAlign:'left', width:'100%', transition:'all 0.15s' }}>
      <span style={{ flexShrink:0, opacity: active ? 1 : 0.75 }}><Ic d={link.icon} size={17} /></span>
      {link.label}
    </button>
  );
}

// ─── VAULT DATA ───────────────────────────────────────────────────────────────
const THUMB_CONFIGS = [
  { bg: 'linear-gradient(135deg, #dde8dd 0%, #b8ccb8 100%)', icon: icons.video },
  { bg: 'linear-gradient(135deg, #dde4f0 0%, #b8c4d8 100%)', icon: icons.book },
  { bg: 'linear-gradient(135deg, #f0dde4 0%, #d8b8c4 100%)', icon: icons.template },
  { bg: 'linear-gradient(135deg, #f0edd8 0%, #d8d0a0 100%)', icon: icons.article },
  { bg: 'linear-gradient(135deg, #e4ddf0 0%, #c4b8d8 100%)', icon: icons.tool },
  { bg: 'linear-gradient(135deg, #ddf0ee 0%, #b8d8d4 100%)', icon: icons.video },
  { bg: 'linear-gradient(135deg, #f0e4dd 0%, #d8c4b8 100%)', icon: icons.book },
  { bg: 'linear-gradient(135deg, #dde8f0 0%, #b8c8d8 100%)', icon: icons.template },
  { bg: 'linear-gradient(135deg, #f0ddee 0%, #d8b8d4 100%)', icon: icons.video },

const ALL_ITEMS = [
  { id:1,  type:'Video',    subtype:'YouTube',   level:'Beginner',     title:'What Is Prompt Engineering?',                         desc:'A beginner-friendly introduction to prompt engineering — what it is, why it matters, and how to apply it.',                        duration:'12 min', views:0, thumb:0 },

  { id:3,  type:'Template', subtype:'',          level:'Beginner',     title:'My Prompt Starter Kit',                               desc:'A ready-to-use collection of 20 proven prompt templates covering email, research, summarization.',                               duration:null,     views:0, thumb:2 },
  { id:4,  type:'Video',    subtype:'Custom',    level:'Intermediate', title:'Advanced System Prompts with Claude',                 desc:'Go deep on system prompts: persona design, constraint setting, context injection, and multi-turn flows.',                          duration:'22 min', views:0, thumb:5 },
  { id:5,  type:'Article',  subtype:'',          level:'Beginner',     title:'Why Japanese Professionals Are Adopting AI Now',      desc:'An honest look at what is driving AI adoption in Japanese workplaces, the unique challenges involved.',                             duration:null,     views:0, thumb:3 },

  { id:7,  type:'Template', subtype:'',          level:'Beginner',     title:'AI Meeting Notes Template (Japanese)',                desc:'A downloadable template for capturing and summarizing Japanese business meetings with AI assistance.',                              duration:null,     views:0, thumb:2 },
  { id:8,  type:'Video',    subtype:'YouTube',   level:'Intermediate', title:'Workflow Automation for Japanese Business with Zapier',desc:'A practical video guide to automating repetitive Japanese business workflows with Zapier AI integrations.',                      duration:'25 min', views:0, thumb:0 },
  { id:9,  type:'Video',    subtype:'YouTube',   level:'Beginner',     title:'ChatGPT vs Claude vs Gemini: Which AI Tool Is Right for You?', desc:'A clear-headed comparison of the three leading AI assistants — capabilities, pricing, use cases, and limitations.',     duration:'18 min', views:0, thumb:8 },
  { id:10, type:'Guide',    subtype:'',          level:'Beginner',     title:'The Non-Technical AI Glossary',                       desc:'Plain-language definitions for every AI term that actually matters — no jargon, no fluff.',                                         duration:null,     views:0, thumb:1 },
  { id:11, type:'Tool',     subtype:'',          level:'Intermediate', title:'Custom GPT Builder Checklist',                       desc:'A step-by-step checklist for building and deploying your first Custom GPT for a real workflow.',                                    duration:null,     views:0, thumb:4 },
  { id:12, type:'Video',    subtype:'Custom',    level:'Beginner',     title:'AI for Email: A Complete Workflow',                   desc:'Watch how to build a complete AI-powered email workflow from scratch — inbox zero is actually possible.',                            duration:'14 min', views:0, thumb:5 },
];

// ─── FILTER CHIP ─────────────────────────────────────────────────────────────
function Chip({ label, active, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      onClick={onClick}
      style={{
        padding: '6px 14px', borderRadius: 20, border: 'none', cursor: 'pointer',
        fontFamily: 'inherit', fontSize: 12.5, fontWeight: active ? 700 : 500,
        background: active ? T.teal : hover ? 'rgba(26,43,51,0.06)' : T.white,
        color: active ? '#fff' : hover ? T.navy : T.slate,
        border: active ? 'none' : '1px solid rgba(26,43,51,0.1)',
        transition: 'all 0.15s',
        whiteSpace: 'nowrap',
      }}
    >{label}</button>
  );
}

// ─── LEVEL CHIP ──────────────────────────────────────────────────────────────
function LevelChip({ label, active, onClick }) {
  const [hover, setHover] = useState(false);
  const colors = {
    'All Levels': T.teal,
    'Beginner': T.teal,
    'Intermediate': T.coral,
    'Advanced': '#8B6FCC',
  };
  const col = colors[label] || T.teal;
  return (
    <button
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      onClick={onClick}
      style={{
        padding: '5px 13px', borderRadius: 20, border: 'none', cursor: 'pointer',
        fontFamily: 'inherit', fontSize: 12, fontWeight: active ? 700 : 500,
        background: active ? col : hover ? 'rgba(26,43,51,0.05)' : 'transparent',
        color: active ? '#fff' : T.slate,
        border: `1px solid ${active ? col : 'rgba(26,43,51,0.1)'}`,
        transition: 'all 0.15s',
      }}
    >{label}</button>
  );
}

// ─── VAULT CARD ──────────────────────────────────────────────────────────────
function VaultCard({ item }) {
  const [hover, setHover] = useState(false);
  const [bookmarked, setBookmarked] = useState(false);
  const cfg = THUMB_CONFIGS[item.thumb];

  const typeIcon = {
    Video: icons.video, Guide: icons.book, Template: icons.template,
    Article: icons.article, Tool: icons.tool, Recording: icons.mic,
  }[item.type] || icons.book;

  const levelColor = item.level === 'Intermediate' ? T.coral : item.level === 'Advanced' ? '#8B6FCC' : T.teal;
  const levelBg    = item.level === 'Intermediate' ? T.coralSoft : item.level === 'Advanced' ? 'rgba(139,111,204,0.1)' : T.tealSoft;

  return (
    <div
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: T.white, borderRadius: 14,
        border: `1px solid ${hover ? 'rgba(15,169,160,0.2)' : 'rgba(26,43,51,0.07)'}`,
        boxShadow: hover ? '0 10px 32px rgba(26,43,51,0.1)' : '0 2px 8px rgba(26,43,51,0.04)',
        transition: 'all 0.2s', cursor: 'pointer', overflow: 'hidden',
        transform: hover ? 'translateY(-2px)' : 'none',
        display: 'flex', flexDirection: 'column',
      }}
    >
      {/* Thumbnail */}
      <div style={{
        height: 120, background: cfg.bg, position: 'relative',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <div style={{ color: 'rgba(26,43,51,0.22)' }}><Ic d={cfg.icon} size={36} stroke={1.2} /></div>

        {/* Lock overlay on hover */}
        <div style={{
          position: 'absolute', inset: 0,
          background: hover ? 'rgba(15,169,160,0.06)' : 'transparent',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.2s',
        }}>
          {hover && (
            <div style={{
              background: T.teal, color: '#fff', borderRadius: 20,
              padding: '6px 14px', fontSize: 12, fontWeight: 700,
              display: 'flex', alignItems: 'center', gap: 5,
            }}>
              <Ic d={icons.lock} size={12} stroke={2} /> Unlock
            </div>
          )}
        </div>

        {/* Duration badge */}
        {item.duration && (
          <div style={{
            position: 'absolute', bottom: 8, right: 8,
            background: 'rgba(26,43,51,0.65)', color: '#fff', backdropFilter: 'blur(4px)',
            borderRadius: 6, padding: '2px 8px', fontSize: 11, fontWeight: 600,
            display: 'flex', alignItems: 'center', gap: 4,
          }}>
            <Ic d={icons.clock} size={11} /> {item.duration}
          </div>
        )}

        {/* Bookmark */}
        <button
          onClick={e => { e.stopPropagation(); setBookmarked(b => !b); }}
          style={{
            position: 'absolute', top: 8, right: 8,
            width: 28, height: 28, borderRadius: 7,
            background: bookmarked ? T.coral : 'rgba(255,255,255,0.8)',
            border: 'none', cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            color: bookmarked ? '#fff' : T.caption,
            backdropFilter: 'blur(4px)',
            transition: 'all 0.15s',
            opacity: hover || bookmarked ? 1 : 0,
          }}
        ><Ic d={icons.bookmark} size={13} stroke={2} /></button>
      </div>

      {/* Body */}
      <div style={{ padding: '14px 14px 16px', flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
        <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
          <span style={{
            fontSize: 10.5, fontWeight: 700, padding: '2px 8px', borderRadius: 20,
            background: 'rgba(26,43,51,0.06)', color: T.slate,
          }}>{item.subtype ? `${item.type} · ${item.subtype}` : item.type}</span>
          <span style={{
            fontSize: 10.5, fontWeight: 700, padding: '2px 8px', borderRadius: 20,
            background: levelBg, color: levelColor,
          }}>{item.level}</span>
        </div>
        <h4 style={{ fontSize: 13.5, fontWeight: 700, color: T.navy, lineHeight: 1.4, letterSpacing: '-0.01em' }}>
          {item.title}
        </h4>
        <p style={{ fontSize: 12, lineHeight: 1.55, color: T.caption, flex: 1 }}>{item.desc}</p>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4, color: T.caption }}>
          <Ic d={icons.eye} size={13} />
          <span style={{ fontSize: 11.5 }}>{item.views}</span>
        </div>
      </div>
    </div>
  );
}

// ─── VAULT MAIN ──────────────────────────────────────────────────────────────
function Vault() {
  const [activeTab, setActiveTab] = useState('Browse');
  const [search, setSearch] = useState('');
  const [typeFilter, setTypeFilter] = useState('All Types');
  const [levelFilter, setLevelFilter] = useState('All Levels');
  const [sortBy, setSortBy] = useState('Newest');
  const [viewMode, setViewMode] = useState('grid');

  const tabs = [
    { id: 'Browse',      icon: icons.grid },
    { id: 'In Series',   icon: icons.series },
    { id: 'Bookmarks',   icon: icons.bookmark },
    { id: 'Watch Later', icon: icons.watchlater },
    { id: 'Notes',       icon: icons.notes },
  ];

  const types  = ['All Types', 'Video', 'Article', 'Guide', 'Template', 'Tool', 'Recording'];
  const levels = ['All Levels', 'Beginner', 'Intermediate', 'Advanced'];
  const sorts  = ['Newest', 'Most Viewed', 'A–Z', 'Duration'];

  const filtered = useMemo(() => {
    return ALL_ITEMS.filter(item => {
      const matchType  = typeFilter === 'All Types'  || item.type === typeFilter;
      const matchLevel = levelFilter === 'All Levels' || item.level === levelFilter;
      const matchSearch = !search || item.title.toLowerCase().includes(search.toLowerCase()) || item.desc.toLowerCase().includes(search.toLowerCase());
      return matchType && matchLevel && matchSearch;
    });
  }, [typeFilter, levelFilter, search]);

  return (
    <div style={{ flex: 1, overflowY: 'auto', background: T.canvas, display: 'flex', flexDirection: 'column' }}>

      {/* ── Header band ── */}
      <div style={{
        padding: '28px 32px 0',
        background: T.canvas,
        borderBottom: '1px solid rgba(26,43,51,0.08)',
      }}>
        {/* Title row */}
        <div style={{ display: 'flex', alignItems: 'flex-end', justifyContent: 'space-between', marginBottom: 20 }}>
          <div>
            <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 6 }}>
              <div style={{
                width: 36, height: 36, borderRadius: 10,
                background: T.tealSoft, color: T.teal,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}><Ic d={icons.vault} size={18} /></div>
              <h1 style={{ fontSize: 24, fontWeight: 700, color: T.navy, letterSpacing: '-0.02em' }}>The Vault</h1>
              <span style={{
                fontSize: 11, fontWeight: 700, padding: '3px 10px', borderRadius: 20,
                background: T.tealSoft, color: T.teal, letterSpacing: '0.04em',
              }}>{filtered.length} items</span>
            </div>
            <p style={{ fontSize: 14, color: T.caption, paddingLeft: 48 }}>
              Tutorials, guides, templates, and tools — all in one place.
            </p>
          </div>
          {/* View toggle */}
          <div style={{ display: 'flex', background: T.sand, borderRadius: 9, padding: 3, gap: 2 }}>
            {[['grid', icons.grid], ['list', icons.list]].map(([mode, icon]) => (
              <button key={mode} onClick={() => setViewMode(mode)} style={{
                width: 32, height: 30, borderRadius: 7, border: 'none', cursor: 'pointer',
                background: viewMode === mode ? T.white : 'transparent',
                color: viewMode === mode ? T.navy : T.caption,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: viewMode === mode ? '0 1px 4px rgba(26,43,51,0.1)' : 'none',
                transition: 'all 0.15s',
              }}><Ic d={icon} size={15} /></button>
            ))}
          </div>
        </div>

        {/* Tab bar */}
        <div style={{ display: 'flex', gap: 0 }}>
          {tabs.map(tab => (
            <TabItem key={tab.id} tab={tab} active={activeTab === tab.id} onClick={() => setActiveTab(tab.id)} />
          ))}
        </div>
      </div>

      {/* ── Controls ── */}
      <div style={{ padding: '20px 32px 16px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {/* Search */}
        <div style={{ position: 'relative' }}>
          <div style={{ position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: T.caption }}>
            <Ic d={icons.search} size={16} />
          </div>
          <input
            type="text" value={search} onChange={e => setSearch(e.target.value)}
            placeholder="Search the Vault…"
            style={{
              width: '100%', padding: '11px 16px 11px 40px',
              border: '1.5px solid rgba(26,43,51,0.12)', borderRadius: 10,
              fontSize: 14, outline: 'none', background: T.white,
              color: T.navy, fontFamily: 'inherit',
              boxShadow: '0 2px 8px rgba(26,43,51,0.04)',
              transition: 'border-color 0.2s',
            }}
          />
          {search && (
            <button onClick={() => setSearch('')} style={{
              position: 'absolute', right: 12, top: '50%', transform: 'translateY(-50%)',
              background: 'none', border: 'none', cursor: 'pointer', color: T.caption,
              fontSize: 18, lineHeight: 1,
            }}>×</button>
          )}
        </div>

        {/* Filters row */}
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 12, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', alignItems: 'center' }}>
            {/* Type */}
            <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
              {types.map(t => (
                <Chip key={t} label={t} active={typeFilter===t} onClick={() => setTypeFilter(t)} />
              ))}
            </div>
            <div style={{ width: 1, height: 20, background: 'rgba(26,43,51,0.12)', margin: '0 4px' }}></div>
            {/* Level */}
            <div style={{ display: 'flex', gap: 5 }}>
              {levels.map(l => (
                <LevelChip key={l} label={l} active={levelFilter===l} onClick={() => setLevelFilter(l)} />
              ))}
            </div>
          </div>
          {/* Sort */}
          <div style={{ position: 'relative' }}>
            <select
              value={sortBy} onChange={e => setSortBy(e.target.value)}
              style={{
                padding: '7px 30px 7px 12px', borderRadius: 8,
                border: '1px solid rgba(26,43,51,0.12)',
                background: T.white, color: T.slate,
                fontSize: 13, fontFamily: 'inherit', fontWeight: 500,
                outline: 'none', cursor: 'pointer', appearance: 'none',
                backgroundImage: "url(\"data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%235A6B73' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\")",
                backgroundRepeat: 'no-repeat', backgroundPosition: 'right 10px center',
              }}
            >
              {sorts.map(s => <option key={s}>{s}</option>)}
            </select>
          </div>
        </div>
      </div>

      {/* ── Grid ── */}
      <div style={{ padding: '0 32px 32px', flex: 1 }}>
        {filtered.length === 0 ? (
          <div style={{
            textAlign: 'center', padding: '64px 32px',
            background: T.white, borderRadius: 16,
            border: '1px dashed rgba(26,43,51,0.15)',
          }}>
            <p style={{ fontSize: 16, fontWeight: 600, color: T.slate, marginBottom: 8 }}>No results found</p>
            <p style={{ fontSize: 14, color: T.caption }}>Try adjusting your filters or search term.</p>
          </div>
        ) : viewMode === 'grid' ? (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
            {filtered.map(item => <VaultCard key={item.id} item={item} />)}
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {filtered.map(item => <ListRow key={item.id} item={item} />)}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── TAB ITEM ─────────────────────────────────────────────────────────────────
function TabItem({ tab, active, onClick }) {
  const [hover, setHover] = useState(false);
  return (
    <button
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      onClick={onClick}
      style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '10px 16px', border: 'none', cursor: 'pointer',
        background: 'transparent', fontFamily: 'inherit',
        fontSize: 13.5, fontWeight: active ? 700 : 500,
        color: active ? T.teal : hover ? T.navy : T.slate,
        borderBottom: active ? `2px solid ${T.teal}` : '2px solid transparent',
        marginBottom: -1, transition: 'all 0.15s',
      }}
    >
      <Ic d={tab.icon} size={14} />
      {tab.id}
    </button>
  );
}

// ─── LIST ROW ─────────────────────────────────────────────────────────────────
function ListRow({ item }) {
  const [hover, setHover] = useState(false);
  const [bookmarked, setBookmarked] = useState(false);
  const cfg = THUMB_CONFIGS[item.thumb];
  const levelColor = item.level === 'Intermediate' ? T.coral : item.level === 'Advanced' ? '#8B6FCC' : T.teal;
  const levelBg    = item.level === 'Intermediate' ? T.coralSoft : item.level === 'Advanced' ? 'rgba(139,111,204,0.1)' : T.tealSoft;

  return (
    <div
      onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
      style={{
        background: T.white, borderRadius: 12,
        border: `1px solid ${hover ? 'rgba(15,169,160,0.18)' : 'rgba(26,43,51,0.07)'}`,
        boxShadow: hover ? '0 6px 20px rgba(26,43,51,0.08)' : '0 2px 6px rgba(26,43,51,0.03)',
        transition: 'all 0.18s', cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 16, padding: '14px 18px',
      }}
    >
      {/* Mini thumb */}
      <div style={{
        width: 56, height: 56, borderRadius: 10, flexShrink: 0,
        background: cfg.bg,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        color: 'rgba(26,43,51,0.25)',
      }}><Ic d={cfg.icon} size={22} stroke={1.3} /></div>

      {/* Info */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', gap: 5, marginBottom: 5 }}>
          <span style={{ fontSize: 10.5, fontWeight: 700, padding: '2px 8px', borderRadius: 20, background: 'rgba(26,43,51,0.06)', color: T.slate }}>
            {item.subtype ? `${item.type} · ${item.subtype}` : item.type}
          </span>
          <span style={{ fontSize: 10.5, fontWeight: 700, padding: '2px 8px', borderRadius: 20, background: levelBg, color: levelColor }}>
            {item.level}
          </span>
        </div>
        <p style={{ fontSize: 14, fontWeight: 700, color: T.navy, marginBottom: 3, letterSpacing: '-0.01em', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.title}</p>
        <p style={{ fontSize: 12.5, color: T.caption, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.desc}</p>
      </div>

      {/* Right side */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, flexShrink: 0 }}>
        {item.duration && (
          <span style={{ fontSize: 12, color: T.caption, display: 'flex', alignItems: 'center', gap: 4 }}>
            <Ic d={icons.clock} size={13} /> {item.duration}
          </span>
        )}
        <button onClick={e => { e.stopPropagation(); setBookmarked(b => !b); }} style={{
          width: 30, height: 30, borderRadius: 7,
          background: bookmarked ? T.coralSoft : 'rgba(26,43,51,0.05)',
          border: 'none', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: bookmarked ? T.coral : T.caption,
        }}><Ic d={icons.bookmark} size={14} stroke={2} /></button>
        <div style={{
          background: hover ? T.teal : T.tealSoft,
          color: hover ? '#fff' : T.teal,
          borderRadius: 8, padding: '7px 14px',
          fontSize: 12.5, fontWeight: 700, transition: 'all 0.15s',
          display: 'flex', alignItems: 'center', gap: 5,
        }}>
          <Ic d={icons.lock} size={13} stroke={2} /> Unlock
        </div>
      </div>
    </div>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [active, setActive] = useState('vault');
  return (
    <div style={{ display: 'flex', height: '100vh' }}>
      <Sidebar active={active} setActive={setActive} />
      <Vault />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
